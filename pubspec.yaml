name: onosendai
description: "A cyberspace.online client."
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cyberspace_client:
    git:
      url: https://github.com/isometricduck/cyberspace_client
      ref: main
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3
  lucide_icons: ^0.257.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.0
  drift: ^2.23.0
  drift_flutter: ^0.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  http: ^1.6.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15
  drift_dev: ^2.23.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/caveman_hamlet.jpg
    - assets/images/onosendai_icon.png
  shaders:
    - assets/shaders/dither.glsl
    - assets/shaders/scanlines.glsl
    - assets/shaders/crt.glsl
    - assets/shaders/cga0.glsl
    - assets/shaders/vhs.glsl
    - assets/shaders/neon.glsl
  fonts:
    - family: EBGaramond
      fonts:
        - asset: assets/fonts/EBGaramond/EBGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/EBGaramond/EBGaramond-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/EBGaramond/EBGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/EBGaramond/EBGaramond-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/EBGaramond/EBGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/EBGaramond/EBGaramond-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/EBGaramond/EBGaramond-Bold.ttf
          weight: 700
        - asset: assets/fonts/EBGaramond/EBGaramond-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/EBGaramond/EBGaramond-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/EBGaramond/EBGaramond-ExtraBoldItalic.ttf
          weight: 800
          style: italic
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Thin.ttf
          weight: 100
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-ExtraLightItalic.ttf
